<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5F0E8">
<title>Pair — Font Pairing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-light: #FDFAF5;
    --outer: #E8E2D7;
    --ink: #1A1714;
    --ink-light: #6B6560;
    --accent: #C8502A;
    --border: rgba(26,23,20,0.1);
    --border-strong: rgba(26,23,20,0.25);
    --shadow: 0 24px 60px -20px rgba(26,23,20,0.18);
  }

  html { font-size: 16px; }

  body {
    background-color: var(--outer);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: var(--cream);
    position: relative;
    overflow-x: hidden;
  }

  @media (min-width: 480px) {
    body { padding: 2rem 0; align-items: flex-start; }
    .app {
      min-height: calc(100vh - 4rem);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
  }

  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.55;
    border-radius: inherit;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 1.4rem 1.5rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    cursor: pointer;
    user-select: none;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .tagline {
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  main { padding: 2rem 1.5rem 3rem; }

  /* On results screen, tighten top spacing */
  main.results-active { padding-top: 1.5rem; }

  .hero { text-align: center; margin-bottom: 2rem; }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 0.75rem;
  }

  .hero h1 em { font-style: italic; color: var(--accent); }

  .hero p {
    font-size: 0.92rem;
    color: var(--ink-light);
    line-height: 1.6;
    padding: 0 0.5rem;
  }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: 8px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    background: var(--cream-light);
  }

  .drop-zone:active { transform: scale(0.99); }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 80, 42, 0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 1rem;
    opacity: 0.35;
  }

  .drop-label strong {
    display: block;
    font-size: 1rem;
    color: var(--ink);
    font-weight: 400;
    margin-bottom: 0.35rem;
  }

  .drop-label {
    font-size: 0.82rem;
    color: var(--ink-light);
    line-height: 1.6;
  }

  /* PREVIEW */
  .image-preview {
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: rgba(0,0,0,0.04);
    margin-bottom: 1rem;
  }

  .image-preview img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    display: block;
  }

  .reset-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: var(--ink);
    color: var(--cream);
    border: none;
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 0.45rem 0.85rem;
    cursor: pointer;
    border-radius: 100px;
    opacity: 0.9;
  }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 3rem 0;
    flex-direction: column;
    align-items: center;
  }

  .loading-dots {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .loading p {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    transition: opacity 0.3s;
  }

  /* RESULT BADGE */
  .result-badge {
    display: none;
    padding: 1.25rem 1.5rem;
    border-left: 2px solid var(--accent);
    background: rgba(200, 80, 42, 0.04);
    margin: 0 0 1.5rem 0;
    border-radius: 0 6px 6px 0;
  }

  .result-badge label {
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 0.4rem;
  }

  .result-badge .identified-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    font-style: italic;
    line-height: 1.1;
  }

  .result-badge .identified-desc {
    font-size: 0.78rem;
    color: var(--ink-light);
    margin-top: 0.5rem;
    line-height: 1.55;
  }

  /* SECTION */
  .section-title {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0 1.25rem;
  }

  .section-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-light);
    white-space: nowrap;
  }

  .section-title::before {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SAMPLE EDITOR */
  .sample-editor {
    margin-bottom: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }

  .sample-field {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .sample-field label {
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .sample-field input, .sample-field textarea {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.7rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .sample-field input:focus, .sample-field textarea:focus {
    border-color: var(--ink);
  }

  /* PAIRS */
  #resultsSection { display: none; }

  .carousel {
    display: flex;
    gap: 0.85rem;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    margin: 0 -1.5rem 1.5rem;
    padding: 0.25rem 1.5rem 0.5rem;
    scroll-padding-left: 1.5rem;
  }

  .carousel::-webkit-scrollbar { display: none; }

  .carousel > .pair-card {
    flex: 0 0 calc(100% - 3rem);
    scroll-snap-align: start;
  }

  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 0.45rem;
    margin: -0.5rem 0 1.5rem;
  }

  .carousel-dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-strong);
    transition: all 0.25s ease;
    cursor: pointer;
    border: none;
    padding: 0;
    flex-shrink: 0;
  }

  .carousel-dots .dot.active {
    background: var(--ink);
    width: 18px;
    border-radius: 100px;
  }

  .pair-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--cream-light);
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pair-specimen {
    padding: 2rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .pair-heading {
    line-height: 1.1;
    margin-bottom: 0.85rem;
    letter-spacing: -0.02em;
    color: var(--ink);
    word-wrap: break-word;
  }

  .pair-body {
    line-height: 1.6;
    color: var(--ink-light);
  }

  .pair-sizes {
    padding: 0.75rem 1.25rem 0;
    display: flex;
    gap: 0.35rem;
  }

  .size-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.66rem;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-light);
    padding: 0.28rem 0.65rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .size-btn:active, .size-btn.active {
    border-color: var(--ink);
    color: var(--ink);
  }

  .pair-meta { padding: 1rem 1.25rem 1.25rem; }

  .pair-fonts {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    margin-bottom: 0.85rem;
  }

  .font-tag { display: flex; flex-direction: column; }

  .font-tag small {
    font-size: 0.56rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.1rem;
  }

  .font-tag strong { font-size: 0.78rem; font-weight: 400; }

  .font-sep {
    font-size: 1rem;
    color: var(--border-strong);
    padding-bottom: 0.25rem;
  }

  .pair-rationale {
    font-size: 0.74rem;
    color: var(--ink-light);
    line-height: 1.55;
    font-style: italic;
    margin-bottom: 0.9rem;
  }

  .pair-actions { display: flex; gap: 0.4rem; }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    padding: 0.55rem 0.75rem;
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.15s;
    text-decoration: none;
    flex: 1;
    text-align: center;
  }

  .action-btn:active { border-color: var(--ink); color: var(--ink); }
  .action-btn.copied { border-color: #4a9c6f; color: #4a9c6f; }

  /* BUTTONS */
  .btn-row {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    margin-bottom: 1.5rem;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 1rem 1.5rem;
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.65rem;
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .btn-primary { background: var(--ink); color: var(--cream); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--ink-light);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:active { color: var(--ink); border-color: var(--ink); }

  /* ERROR */
  .error-msg {
    display: none;
    padding: 0.9rem 1rem;
    border: 1px solid rgba(200,80,42,0.3);
    border-radius: 6px;
    color: var(--accent);
    font-size: 0.82rem;
    margin: 1rem 0;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo" id="logo" role="button" tabindex="0" aria-label="Back to home">P<span>ai</span>r</div>
    <div class="tagline">AI Font Pairing</div>
  </header>

  <main>
    <!-- HERO + UPLOAD -->
    <div id="uploadState">
      <div class="hero">
        <h1>Find your<br><em>perfect pair</em></h1>
        <p>Upload a screenshot with a typeface — AI will identify it and suggest a matching pair.</p>
      </div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*">
        <svg class="drop-icon" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="28" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 32l10-10 8 8 6-6 12 10" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="16" cy="20" r="3" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <div class="drop-label">
          <strong>Upload image</strong>
          PNG, JPG, WEBP — click or drag
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- PREVIEW + ANALYZE -->
    <div id="previewState" style="display:none;">
      <div class="image-preview">
        <img id="previewImg" src="" alt="Reference">
        <button class="reset-btn" id="resetBtn">× Change</button>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="analyseBtn">Analyze →</button>
      </div>
      <div class="error-msg" id="errorMsg2"></div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p id="loadingText">Identifying the typeface</p>
    </div>

    <!-- RESULTS -->
    <div id="resultsSection">
      <div class="result-badge" id="resultBadge">
        <label>AI Detected</label>
        <div class="identified-name" id="identifiedName">—</div>
        <div class="identified-desc" id="identifiedDesc"></div>
      </div>

      <div class="sample-editor">
        <div class="sample-field">
          <label>Heading</label>
          <input type="text" id="sampleHeading" value="The Art of Typography">
        </div>
        <div class="sample-field">
          <label>Body</label>
          <textarea id="sampleBody" rows="2">Good typography is invisible. It guides the reader through content with effortless grace.</textarea>
        </div>
      </div>

      <div class="carousel" id="carousel"></div>
      <div class="carousel-dots" id="carouselDots"></div>

      <div class="btn-row">
        <button class="btn-secondary" id="newImageBtn">Upload new image</button>
      </div>
    </div>
  </main>
</div>

<script>
  // ── State ──
  let allPairs = [];
  let currentPairIndex = 0;
  let loadedFonts = new Set();
  let uploadedBase64 = null;
  let uploadedMime = 'image/jpeg';

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const dropZone = $('dropZone');
  const fileInput = $('fileInput');
  const uploadState = $('uploadState');
  const previewState = $('previewState');
  const previewImg = $('previewImg');
  const resetBtn = $('resetBtn');
  const analyseBtn = $('analyseBtn');
  const loading = $('loading');
  const loadingText = $('loadingText');
  const resultsSection = $('resultsSection');
  const resultBadge = $('resultBadge');
  const identifiedName = $('identifiedName');
  const identifiedDesc = $('identifiedDesc');
  const carousel = $('carousel');
  const carouselDots = $('carouselDots');
  const sampleHeading = $('sampleHeading');
  const sampleBody = $('sampleBody');
  const newImageBtn = $('newImageBtn');
  const errorMsg = $('errorMsg');
  const errorMsg2 = $('errorMsg2');
  const logo = $('logo');

  // ── Logo → home ──
  logo.addEventListener('click', goHome);
  logo.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goHome(); }
  });

  function goHome() {
    uploadedBase64 = null;
    fileInput.value = '';
    previewImg.src = '';
    uploadState.style.display = 'block';
    previewState.style.display = 'none';
    resultsSection.style.display = 'none';
    loading.style.display = 'none';
    document.querySelector('main').classList.remove('results-active');
    allPairs = [];
    currentPairIndex = 0;
    hideError();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Upload ──
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  // Change & New Image buttons → open file picker directly
  resetBtn.addEventListener('click', openFilePicker);
  newImageBtn.addEventListener('click', openFilePicker);

  function openFilePicker() {
    fileInput.value = '';
    fileInput.click();
  }

  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      showError('Not an image. Upload a PNG, JPG, or WEBP.');
      return;
    }
    hideError();
    const { base64, mime, dataUrl } = await resizeImage(file, 1024);
    uploadedBase64 = base64;
    uploadedMime = mime;
    previewImg.src = dataUrl;
    uploadState.style.display = 'none';
    previewState.style.display = 'block';
    resultsSection.style.display = 'none';
    loading.style.display = 'none';
    document.querySelector('main').classList.remove('results-active');
  }

  function resizeImage(file, maxSize = 1024) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const w = Math.floor(img.width * scale);
        const h = Math.floor(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
        resolve({
          base64: dataUrl.split(',')[1],
          mime: 'image/jpeg',
          dataUrl
        });
      };
      img.src = URL.createObjectURL(file);
    });
  }

  // ── Analyse ──
  analyseBtn.addEventListener('click', analyse);

  async function analyse() {
    if (!uploadedBase64) return;

    analyseBtn.disabled = true;
    previewState.style.display = 'none';
    resultsSection.style.display = 'none';
    loading.style.display = 'flex';
    hideError();

    const steps = ['Identifying the typeface', 'Analyzing the character', 'Finding pairs', 'Almost there'];
    let i = 0;
    loadingText.textContent = steps[0];
    const interval = setInterval(() => {
      i = (i + 1) % steps.length;
      loadingText.style.opacity = '0';
      setTimeout(() => {
        loadingText.textContent = steps[i];
        loadingText.style.opacity = '1';
      }, 250);
    }, 1800);

    try {
      const response = await fetch('/.netlify/functions/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: uploadedBase64, mimeType: uploadedMime })
      });

      const data = await response.json();

      clearInterval(interval);
      loading.style.display = 'none';
      analyseBtn.disabled = false;

      if (!response.ok || data.error) {
        previewState.style.display = 'block';
        showError(data.error || 'Something went wrong. Try again.');
        return;
      }

      if (!data.pairs || data.pairs.length === 0) {
        previewState.style.display = 'block';
        showError('Could not identify a typeface. Try an image with clearer text.');
        return;
      }

      displayResults(data);
    } catch (err) {
      clearInterval(interval);
      loading.style.display = 'none';
      analyseBtn.disabled = false;
      previewState.style.display = 'block';
      showError('Network error. Check your connection and try again.');
    }
  }

  // ── Display ──
  function displayResults(data) {
    resultsSection.style.display = 'block';
    previewState.style.display = 'none';
    document.querySelector('main').classList.add('results-active');

    if (data.identified) {
      identifiedName.textContent = data.identified.name || 'Typeface';
      identifiedDesc.textContent = data.identified.description || '';
      resultBadge.style.display = 'block';
    }

    allPairs = data.pairs;
    currentPairIndex = 0;
    renderAllPairs();
  }

  function renderAllPairs() {
    carousel.innerHTML = '';
    const headingText = sampleHeading.value || 'The Art of Typography';
    const bodyText = sampleBody.value || 'Good typography is invisible.';
    const fontSizeMap = { sm: ['1.5rem','0.82rem'], md: ['2.2rem','0.95rem'], lg: ['3.2rem','1rem'] };

    allPairs.forEach(p => {
      loadGoogleFont(p.heading_font, p.heading_weight);
      loadGoogleFont(p.body_font, p.body_weight);

      const hFamilyUrl = p.heading_font.replace(/ /g,'+');
      const bFamilyUrl = p.body_font.replace(/ /g,'+');
      const importLine = `@import url('https://fonts.googleapis.com/css2?family=${hFamilyUrl}:wght@${p.heading_weight}&family=${bFamilyUrl}:wght@${p.body_weight}&display=swap');`;

      const card = document.createElement('div');
      card.className = 'pair-card';
      card.innerHTML = `
        <div class="pair-specimen">
          <div class="pair-heading" style="font-family:'${p.heading_font}',serif; font-size:2.2rem; font-weight:${p.heading_weight};">${escapeHtml(headingText)}</div>
          <div class="pair-body" style="font-family:'${p.body_font}',sans-serif; font-size:0.95rem; font-weight:${p.body_weight};">${escapeHtml(bodyText)}</div>
        </div>
        <div class="pair-sizes">
          <button class="size-btn" data-size="sm">Aa</button>
          <button class="size-btn active" data-size="md">Aa</button>
          <button class="size-btn" data-size="lg">Aa</button>
        </div>
        <div class="pair-meta">
          <div class="pair-fonts">
            <div class="font-tag"><small>Heading</small><strong>${escapeHtml(p.heading_font)} · ${p.heading_weight}</strong></div>
            <div class="font-sep">+</div>
            <div class="font-tag"><small>Body</small><strong>${escapeHtml(p.body_font)} · ${p.body_weight}</strong></div>
          </div>
          <div class="pair-rationale">${escapeHtml(p.rationale || '')}</div>
          <div class="pair-actions">
            <button class="action-btn copy-btn" data-import="${importLine.replace(/"/g,'&quot;')}">Copy CSS</button>
            <a class="action-btn" href="https://fonts.google.com/specimen/${hFamilyUrl}" target="_blank" rel="noopener">Fonts ↗</a>
          </div>
        </div>
      `;

      card.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const [hSize, bSize] = fontSizeMap[btn.dataset.size];
          card.querySelector('.pair-heading').style.fontSize = hSize;
          card.querySelector('.pair-body').style.fontSize = bSize;
        });
      });

      card.querySelector('.copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(this.dataset.import).then(() => {
          const orig = this.textContent;
          this.textContent = '✓ Copied';
          this.classList.add('copied');
          setTimeout(() => { this.textContent = orig; this.classList.remove('copied'); }, 1800);
        });
      });

      carousel.appendChild(card);
    });

    carousel.scrollLeft = 0;
    renderDots();
  }

  function renderDots() {
    carouselDots.innerHTML = '';
    allPairs.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Pair ${i + 1}`);
      dot.addEventListener('click', () => scrollToPair(i));
      carouselDots.appendChild(dot);
    });
  }

  function scrollToPair(idx) {
    const firstCard = carousel.querySelector('.pair-card');
    if (!firstCard) return;
    const step = firstCard.offsetWidth + parseFloat(getComputedStyle(carousel).gap || 0);
    carousel.scrollTo({ left: step * idx, behavior: 'smooth' });
  }

  function updateActiveDot(idx) {
    const dots = carouselDots.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  // Sync dots as user scrolls the carousel
  let lastDotIdx = 0;
  carousel.addEventListener('scroll', () => {
    const firstCard = carousel.querySelector('.pair-card');
    if (!firstCard) return;
    const step = firstCard.offsetWidth + parseFloat(getComputedStyle(carousel).gap || 0);
    const idx = Math.round(carousel.scrollLeft / step);
    if (idx !== lastDotIdx && idx >= 0 && idx < allPairs.length) {
      lastDotIdx = idx;
      updateActiveDot(idx);
    }
  });

  // ── Dynamic Google Fonts loader ──
  function loadGoogleFont(family, weight) {
    const key = `${family}:${weight}`;
    if (loadedFonts.has(key)) return;
    loadedFonts.add(key);
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${family.replace(/ /g,'+')}:wght@${weight}&display=swap`;
    document.head.appendChild(link);
  }

  // ── Live edit ──
  sampleHeading.addEventListener('input', updateSpecimens);
  sampleBody.addEventListener('input', updateSpecimens);

  function updateSpecimens() {
    document.querySelectorAll('.pair-heading').forEach(el => {
      el.textContent = sampleHeading.value || 'The Art of Typography';
    });
    document.querySelectorAll('.pair-body').forEach(el => {
      el.textContent = sampleBody.value || 'Good typography is invisible.';
    });
  }

  // ── Utils ──
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showError(msg) {
    const el = previewState.style.display !== 'none' ? errorMsg2 : errorMsg;
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() {
    errorMsg.style.display = 'none';
    errorMsg2.style.display = 'none';
  }
</script>
</body>
</html>
